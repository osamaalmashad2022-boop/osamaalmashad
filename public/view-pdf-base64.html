<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PDF Base64 Renderer</title>
  <script src="https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #0a0a0f;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }
    canvas {
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
      background-color: white;
      max-width: 100%;
      height: auto;
    }
    #loading {
      color: #00f5d4;
      font-family: sans-serif;
      font-size: 1.5rem;
    }
  </style>
</head>
<body>
  <div id="loading">Loading PDF via Base64...</div>
  <canvas id="pdf-canvas" style="display: none;"></canvas>

  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.worker.min.js';

    const urlParams = new URLSearchParams(window.location.search);
    const fileName = urlParams.get('file');

    function base64ToUint8Array(base64) {
      const raw = window.atob(base64);
      const rawLength = raw.length;
      const array = new Uint8Array(new ArrayBuffer(rawLength));
      for (let i = 0; i < rawLength; i++) {
        array[i] = raw.charCodeAt(i);
      }
      return array;
    }

    if (!fileName) {
      document.getElementById('loading').textContent = 'Error: No file specified in URL query (?file=...)';
    } else {
      console.log('Fetching PDF base64 for:', fileName);
      fetch(`/api/get-pdf?file=${encodeURIComponent(fileName)}`)
        .then(response => {
          if (!response.ok) throw new Error('API returned ' + response.status);
          return response.text();
        })
        .then(base64Text => {
          console.log('Base64 fetched. Converting to Uint8Array...');
          const pdfData = base64ToUint8Array(base64Text);
          return pdfjsLib.getDocument({ data: pdfData }).promise;
        })
        .then(pdf => {
          console.log('PDF parsed successfully. Pages:', pdf.numPages);
          return pdf.getPage(1);
        })
        .then(page => {
          console.log('Rendering page 1...');
          const canvas = document.getElementById('pdf-canvas');
          const ctx = canvas.getContext('2d');
          const viewport = page.getViewport({ scale: 2.0 });
          canvas.width = viewport.width;
          canvas.height = viewport.height;
          const renderContext = {
            canvasContext: ctx,
            viewport: viewport
          };
          return page.render(renderContext).promise;
        })
        .then(() => {
          console.log('PDF rendered onto canvas!');
          document.getElementById('loading').style.display = 'none';
          const canvas = document.getElementById('pdf-canvas');
          canvas.style.display = 'block';
          window.pdfRenderFinished = true;
        })
        .catch(err => {
          console.error('Error rendering PDF:', err);
          document.getElementById('loading').textContent = 'Error: ' + err.message;
        });
    }
  </script>
</body>
</html>
